<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Panamá Autoactualizable</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        header {
            background: #0077cc;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 24px;
        }

        .container {
            padding: 20px;
        }

        .status {
            margin-top: 10px;
            text-align: center;
            color: #555;
            font-size: 14px;
        }
    </style>

    <script>
        // Auto-recarga cada 60 segundos
        setInterval(function () {
            location.reload();
        }, 5000);
    </script>
</head>
<body>

    <header>
        Chat Panamá en Vivo
    </header>

    <div class="container">

<iframe src="https://www.chateamos.net/webchat/chat.php?nick=pago?&channel=panama" style="border:0; width:100%; height:400px;"></iframe>
<iframe src="https://www.chateamos.net/webchat/chat.php?nick=pago?&channel=panama" style="border:0; width:100%; height:400px;"></iframe> 
<iframe src="https://www.chateamos.net/webchat/chat.php?nick=pago?&channel=panama" style="border:0; width:100%; height:400px;"></iframe> 

        <div class="status">
            Esta página se actualiza automáticamente cada 5 segundos.
        </div>

    </div>

</body>
</html>
